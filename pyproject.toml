[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "slidko"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = [
    "numpy",
    "scipy",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "ruff",
]

[tool.ruff.lint]
extend-select = [
    "I",  # isort
]
extend-ignore = []

[tool.ruff.format]
quote-style = "double"
indent-style = "space"

[tool.pytest.ini_options]
python_files = ["tests/*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
testpaths = ["tests"]
