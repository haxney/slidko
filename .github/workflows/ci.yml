name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.11" ]

    steps:
    - uses: actions/checkout@v7

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install sigrok-cli
      run: |
        sudo apt-get update
        sudo apt-get install -y sigrok-cli

    - name: Install dependencies
      run: |
        python -m venv .venv
        .venv/bin/pip install -e '.[dev]'

    - name: Run verification gate
      run: |
        make check

  firmware:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Install toolchain (cmake, host gcc, arm-none-eabi-gcc, clang-format)
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake gcc gcc-arm-none-eabi clang-format

    - name: clang-format check
      run: |
        find firmware/src firmware/test -name '*.c' -o -name '*.h' \
          | xargs clang-format --dry-run --Werror --style=file

    - name: Provision pico-sdk
      run: |
        if [ ! -f firmware/vendor/pico-sdk/pico_sdk_init.cmake ]; then
          git clone --branch 2.3.0 --depth 1 \
            https://github.com/raspberrypi/pico-sdk.git firmware/vendor/pico-sdk
          git -C firmware/vendor/pico-sdk submodule update --init --depth 1 lib/tinyusb
        fi

    - name: Build and run native protocol tests (host)
      run: |
        cmake -S firmware/test -B firmware/test/build
        cmake --build firmware/test/build
        ctest --test-dir firmware/test/build --output-on-failure

    - name: Compile pico2 (RP2350) target
      run: |
        cmake -S firmware -B firmware/build-pico2 \
          -DPICO_BOARD=pico2 -DPICO_SDK_PATH=firmware/vendor/pico-sdk
        cmake --build firmware/build-pico2

    - name: Compile pico (RP2040) target
      run: |
        cmake -S firmware -B firmware/build-pico \
          -DPICO_BOARD=pico -DPICO_SDK_PATH=firmware/vendor/pico-sdk
        cmake --build firmware/build-pico
